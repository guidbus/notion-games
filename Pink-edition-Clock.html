<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GUIDBUS Mini Clock</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@700;800&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:#191919;
      --blue1:#cc73a2;
      --blue2:#b35488;
      --blue3:#8d416a;
      --shadow:rgba(0,0,0,.35);
      --split:rgba(0,0,0,.18);
    }

    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
    }

    html,body{
      width:100%;
      height:100%;
      background:var(--bg);
      overflow:hidden;
    }

    body{
      display:flex;
      align-items:center;
      justify-content:center;
      font-family:"Inter",sans-serif;
      background:var(--bg);
    }

    .wrap{
      width:100%;
      height:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:4px;
      background:var(--bg);
      overflow:hidden;
    }

    .clock-container{
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:4px;
      transform:scale(1);
      transform-origin:center;
    }

.clock-row{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:4px;
}

.group{
  display:flex;
  align-items:center;
  gap:2px;
}

.separator{
  font-family:"Anton",sans-serif;
  font-size:1.6rem;
  line-height:1;
  color:var(--blue2);
  transform:translateY(-1px);
  user-select:none;
  text-shadow:0 2px 6px rgba(0,0,0,.12);
}

.time-card{
  position:relative;
  width:52px;
  height:52px;
  border-radius:10px;
  overflow:hidden;
  background:linear-gradient(180deg,var(--blue1) 0%,var(--blue2) 60%,var(--blue3) 100%);
  box-shadow:
    0 6px 14px var(--shadow),
    inset 0 1px 0 rgba(255,255,255,.08);
  display:flex;
  align-items:center;
  justify-content:center;
}

.time-card .digit{
  position:relative;
  z-index:3;
  font-family:"Anton",sans-serif;
  font-size:2.45rem;
  line-height:1;
  color:#ffffff;
  letter-spacing:.5px;
  user-select:none;
  text-shadow:0 1px 0 rgba(0,0,0,.05);
  transform:translateY(-1px);
}

.ampm{
  min-width:38px;
  height:26px;
  padding:0 8px;
  border-radius:7px;
  background:linear-gradient(180deg,var(--blue1) 0%,var(--blue2) 60%,var(--blue3) 100%);
  box-shadow:
    0 5px 12px var(--shadow),
    inset 0 1px 0 rgba(255,255,255,.08);
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
  overflow:hidden;
  transform:translateY(7px);
}

.ampm span{
  position:relative;
  z-index:2;
  font-family:"Anton",sans-serif;
  font-size:0.9rem;
  line-height:1;
  color:#ffffff;
  letter-spacing:.5px;
  user-select:none;
}

.date{
  font-family:"Inter",sans-serif;
  font-size:0.92rem;
  font-weight:800;
  line-height:1.1;
  color:#b35488;
  text-align:center;
  letter-spacing:-0.3px;
  user-select:none;
  margin-top:6px;
  text-shadow:0 1px 4px rgba(0,0,0,.10);
  white-space:nowrap;
}
    .pulse{
      animation:pulse .18s ease;
    }

    @keyframes pulse{
      0%{transform:scale(1);}
      50%{transform:scale(.97);}
      100%{transform:scale(1);}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="clock-container">
      <div class="clock-row">
        <div class="group">
          <div class="time-card" id="hoursCard"><div class="digit" id="hours">11</div></div>
          <div class="separator">:</div>
        </div>

        <div class="group">
          <div class="time-card" id="minutesCard"><div class="digit" id="minutes">22</div></div>
          <div class="separator">:</div>
        </div>

        <div class="group">
          <div class="time-card" id="secondsCard"><div class="digit" id="seconds">33</div></div>
        </div>

        <div class="ampm"><span id="ampm">PM</span></div>
      </div>

      <div class="date" id="dateText">Monday | April 13, 2026</div>
    </div>
  </div>

  <script>
    let prevH = "";
    let prevM = "";
    let prevS = "";

    function pulseCard(id){
      const el = document.getElementById(id);
      el.classList.remove("pulse");
      void el.offsetWidth;
      el.classList.add("pulse");
    }

    function updateClock(){
      const now = new Date();

      let hours = now.getHours();
      const minutes = now.getMinutes();
      const seconds = now.getSeconds();

      const ampm = hours >= 12 ? "PM" : "AM";
      hours = hours % 12;
      hours = hours ? hours : 12;

      const h = String(hours).padStart(2,"0");
      const m = String(minutes).padStart(2,"0");
      const s = String(seconds).padStart(2,"0");

      if(h !== prevH){
        document.getElementById("hours").textContent = h;
        pulseCard("hoursCard");
        prevH = h;
      }

      if(m !== prevM){
        document.getElementById("minutes").textContent = m;
        pulseCard("minutesCard");
        prevM = m;
      }

      if(s !== prevS){
        document.getElementById("seconds").textContent = s;
        pulseCard("secondsCard");
        prevS = s;
      }

      document.getElementById("ampm").textContent = ampm;

      const days = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
      const months = ["January","February","March","April","May","June","July","August","September","October","November","December"];

      document.getElementById("dateText").textContent =
        `${days[now.getDay()]} | ${months[now.getMonth()]} ${now.getDate()}, ${now.getFullYear()}`;
    }

    updateClock();
    setInterval(updateClock, 1000);
  </script>
</body>
</html>
