<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GUIDBUS Blue Calendar Compact</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@600;700;800&display=swap" rel="stylesheet">

  <style>
:root{
  --bg:#191919;
  --grid:#b35488;
  --text:#b35488;
  --muted-bg:#434343;
  --muted-text:#8aa7c9;
  --today-fill:#b35488;
  --today-text:#ffffff;
}
*{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

html,body{
  width:100%;
  height:100%;
  background:var(--bg);
  overflow:hidden;
  font-family:"Inter",sans-serif;
}

body{
  display:flex;
  align-items:stretch;
  justify-content:stretch;
}

.wrap{
  width:100%;
  height:100%;
  background:var(--bg);
  display:flex;
  align-items:stretch;
  justify-content:stretch;
  padding:8px;
  overflow:hidden;
}

.calendar-widget{
  width:100%;
  height:100%;
  min-width:0;
  min-height:0;
  background:var(--bg);
  color:var(--text);
  user-select:none;
  display:grid;
  grid-template-rows:auto auto auto 1fr;
  overflow:hidden;
}

/* TOP BAR */
.top-bar{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:18px;
  margin-bottom:8px;
  flex:0 0 auto;
}

.month-group,
.year-group{
  display:flex;
  align-items:center;
  gap:8px;
}

.label-text{
  font-size:16px;
  font-weight:800;
  color:var(--text);
  min-width:max-content;
  line-height:1;
}

.icon-btn{
  width:24px;
  height:24px;
  border:none;
  background:transparent;
  color:var(--text);
  font-size:22px;
  font-weight:700;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  line-height:1;
  flex:0 0 auto;
}

.icon-btn:hover{
  opacity:.85;
}

/* TODAY BAR */
.today-row{
  display:flex;
  align-items:center;
  justify-content:center;
  margin-bottom:8px;
  flex:0 0 auto;
}

.today-wrap{
  display:flex;
  align-items:center;
  border:2px solid var(--grid);
  border-radius:10px;
  overflow:hidden;
  height:38px;
  flex:0 0 auto;
}

.today-side{
  width:40px;
  height:38px;
  border:none;
  background:transparent;
  color:var(--text);
  font-size:24px;
  font-weight:700;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  line-height:1;
}

.today-btn{
  min-width:95px;
  height:38px;
  border:none;
  border-left:2px solid var(--grid);
  border-right:2px solid var(--grid);
  background:transparent;
  color:var(--text);
  font-size:16px;
  font-weight:700;
  cursor:pointer;
  padding:0 14px;
}

.today-side:hover,
.today-btn:hover{
  opacity:.88;
}

/* WEEKDAY HEADER */
.weekdays{
  display:grid;
  grid-template-columns:repeat(7, 1fr);
  border:2px solid var(--grid);
  border-bottom:none;
  flex:0 0 auto;
}

.weekday{
  min-height:36px;
  height:clamp(34px, 6vh, 46px);
  display:flex;
  align-items:center;
  justify-content:center;
  border-right:2px solid var(--grid);
  color:var(--text);
  font-size:14px;
  font-weight:800;
  line-height:1;
}

.weekday:last-child{
  border-right:none;
}

/* DAYS GRID */
.days{
  display:grid;
  grid-template-columns:repeat(7, 1fr);
  grid-auto-rows:1fr;
  border:2px solid var(--grid);
  border-top:none;
  min-height:0;
  min-width:0;
  height:100%;
}

.day{
  position:relative;
  min-width:0;
  min-height:0;
  height:100%;
  border-right:2px solid var(--grid);
  border-bottom:2px solid var(--grid);
  display:flex;
  align-items:flex-start;
  justify-content:center;
  padding-top:clamp(8px, 1.2vh, 12px);
  font-size:clamp(14px, 1.8vh, 18px);
  font-weight:700;
  color:var(--text);
  background:transparent;
}

.day.today{
  background:var(--today-fill);
}

.day:nth-child(7n){
  border-right:none;
}

.day.last-row{
  border-bottom:none;
}

.day.muted{
  background:var(--muted-bg);
  color:var(--muted-text);
}

.day.muted .day-number{
  opacity:.62;
}

.day-number{
  position:relative;
  z-index:2;
  line-height:1;
}

.day.today .day-number{
  color:var(--today-text);
  font-weight:800;
  line-height:1;
}

/* Small height protection */
@media (max-height:420px){
  .top-bar{
    margin-bottom:6px;
    gap:14px;
  }

  .today-row{
    margin-bottom:6px;
  }

  .weekday{
    height:30px;
    min-height:30px;
    font-size:12px;
  }

  .day{
    padding-top:6px;
    font-size:13px;
  }
}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="calendar-widget">
      
      <!-- TOP BAR -->
      <div class="top-bar">
        <div class="month-group">
          <div class="label-text" id="monthLabel">April</div>
        </div>

        <div class="year-group">
          <button class="icon-btn" id="yearPrev">‹</button>
          <div class="label-text" id="yearLabel">2026</div>
          <button class="icon-btn" id="yearNext">›</button>
        </div>
      </div>

      <!-- TODAY BAR -->
      <div class="today-row">
        <div class="today-wrap">
          <button class="today-side" id="todayPrev">‹</button>
          <button class="today-btn" id="todayBtn">Today</button>
          <button class="today-side" id="todayNext">›</button>
        </div>
      </div>

      <!-- WEEKDAYS -->
      <div class="weekdays" id="weekdays"></div>

      <!-- DAYS -->
      <div class="days" id="daysGrid"></div>
    </div>
  </div>

  <script>
    const weekdaysEl = document.getElementById("weekdays");
    const daysGrid = document.getElementById("daysGrid");
    const monthLabel = document.getElementById("monthLabel");
    const yearLabel = document.getElementById("yearLabel");

    const yearPrev = document.getElementById("yearPrev");
    const yearNext = document.getElementById("yearNext");

    const todayPrev = document.getElementById("todayPrev");
    const todayNext = document.getElementById("todayNext");
    const todayBtn = document.getElementById("todayBtn");

    const weekdayNames = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
    const monthNames = [
      "January","February","March","April","May","June",
      "July","August","September","October","November","December"
    ];

    // Build weekday header once
    weekdayNames.forEach(day => {
      const div = document.createElement("div");
      div.className = "weekday";
      div.textContent = day;
      weekdaysEl.appendChild(div);
    });

    const realToday = new Date();
    let viewYear = realToday.getFullYear();
    let viewMonth = realToday.getMonth(); // 0-11

    function renderCalendar(year, month){
      monthLabel.textContent = monthNames[month];
      yearLabel.textContent = year;

      daysGrid.innerHTML = "";

      const firstDay = new Date(year, month, 1);
      let startDay = firstDay.getDay(); // 0=Sun
      startDay = startDay === 0 ? 6 : startDay - 1; // Monday first

      const daysInMonth = new Date(year, month + 1, 0).getDate();
      const prevMonthDays = new Date(year, month, 0).getDate();

      const totalCells = 35; // 5 rows fixed like indify look
      let usedCells = startDay + daysInMonth;

      // If month needs 6th row, allow 42 cells
      const finalCells = usedCells > 35 ? 42 : 35;

      // Force exact row count so vertical stretch works properly
      daysGrid.style.gridTemplateRows = `repeat(${finalCells / 7}, 1fr)`;

      // Previous month cells
      for(let i = 0; i < startDay; i++){
        const dayNum = prevMonthDays - startDay + 1 + i;
        createDayCell(dayNum, true, false, i >= finalCells - 7);
      }

      // Current month cells
      for(let d = 1; d <= daysInMonth; d++){
        const isToday =
          d === realToday.getDate() &&
          month === realToday.getMonth() &&
          year === realToday.getFullYear();

        const cellIndex = startDay + d - 1;
        createDayCell(d, false, isToday, cellIndex >= finalCells - 7);
      }

      // Next month cells
      const used = startDay + daysInMonth;
      const remaining = finalCells - used;

      for(let n = 1; n <= remaining; n++){
        const cellIndex = used + n - 1;
        createDayCell(n, true, false, cellIndex >= finalCells - 7);
      }
    }

    function createDayCell(number, muted = false, isToday = false, isLastRow = false){
      const day = document.createElement("div");
      day.className = "day";

      if(muted) day.classList.add("muted");
      if(isToday) day.classList.add("today");
      if(isLastRow) day.classList.add("last-row");

      const num = document.createElement("div");
      num.className = "day-number";
      num.textContent = String(number).padStart(2, "0");

      day.appendChild(num);
      daysGrid.appendChild(day);
    }

    function changeMonth(delta){
      viewMonth += delta;

      if(viewMonth < 0){
        viewMonth = 11;
        viewYear--;
      } else if(viewMonth > 11){
        viewMonth = 0;
        viewYear++;
      }

      renderCalendar(viewYear, viewMonth);
    }

    function changeYear(delta){
      viewYear += delta;
      renderCalendar(viewYear, viewMonth);
    }

    function goToday(){
      viewYear = realToday.getFullYear();
      viewMonth = realToday.getMonth();
      renderCalendar(viewYear, viewMonth);
    }

    yearPrev.addEventListener("click", () => changeYear(-1));
    yearNext.addEventListener("click", () => changeYear(1));

    // Today side arrows = month change (indify-like feel)
    todayPrev.addEventListener("click", () => changeMonth(-1));
    todayNext.addEventListener("click", () => changeMonth(1));
    todayBtn.addEventListener("click", goToday);

    renderCalendar(viewYear, viewMonth);
  </script>
</body>
</html>
